<div class="download-dialog">
  <div class="dialog-header">
    <mat-icon class="success-icon">check_circle</mat-icon>
    <h2>Application Submitted!</h2>
    <p>You have successfully applied for <strong>{{ data.title }}</strong>.</p>
  </div>

  <div class="dialog-body">
    <p class="download-info">
      Please download and fill out the application form below. Submit the completed form along with the required documents to any provincial government satellite office.
    </p>
    <button class="download-btn" (click)="downloadForm()">
      <mat-icon>download</mat-icon>
      Download Application Form
    </button>
  </div>

  <div class="dialog-footer">
    <button class="close-btn" (click)="close()">Close</button>
  </div>
</div>
