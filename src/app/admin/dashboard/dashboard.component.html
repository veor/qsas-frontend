<div class="dashboard-toolbar">
  <h2 class="dashboard-title">Dashboard</h2>

  <div class="toolbar-right">
    <!-- Search bar -->
    <input 
      type="text" 
      placeholder="Search scholarships..." 
      class="search-bar" 
      [(ngModel)]="searchText" 
    />

    <!-- Current date -->
    <div class="current-date">{{ currentDate }}</div>
  </div>
</div>


<div class="dashboard-container">
  <main class="dashboard-content">
    <div class="card-grid">
      <div 
        class="scholarship-card" 
        *ngFor="let scholarship of scholarships | search:searchText" 
        (click)="selectScholarship(scholarship)">
        
        <h3>{{ scholarship.title }}</h3>
        <p>{{ scholarship.description }}</p>

        <div class="applicant-info">
          <small>Total number of applicants</small>
          <div class="applicant-count">{{ scholarship.applicants }}</div>
        </div>
      </div>
    </div>
  </main>
</div>
