<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close(false)">Cancel</button>
  <button
    mat-raised-button
    color="primary"
    (click)="close(true)">
    {{ data.confirmText || 'Save' }}
  </button>
</mat-dialog-actions>
