<div class="login-container">
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <div class="logo-icon">
            <img src="assets/images/QSAS-Logo-Sub.png" alt="Logo" (click)="goToApply()"/>
        </div>
      </div>    
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="error-alert" *ngIf="errorMessage">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <line x1="15" y1="9" x2="9" y2="15" stroke="currentColor" stroke-width="2"/>
          <line x1="9" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="2"/>
        </svg>
        {{ errorMessage }}
      </div>

      <div class="input-group">
        <label for="idNo">ID No.</label>
        <div class="input-container">
          <input 
            type="number" 
            id="idNo" 
            name="idNo"
            [(ngModel)]="loginData.idNo"
            placeholder="Enter your ID Number"
            required
            #idNoInput="ngModel">
        </div>
        <div class="error-message" *ngIf="idNoInput.invalid && idNoInput.touched">
          Please enter a valid id number
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-container">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password"
            [(ngModel)]="loginData.password"
            placeholder="Enter your password"
            required
            minlength="12"
            #passwordInput="ngModel">
          <button 
            type="button" 
            class="password-toggle"
            (click)="togglePasswordVisibility()">
            <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12S5 4 12 4S23 12 23 12S19 20 12 20S1 12 1 12Z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 1 12 1 12A16.69 16.69 0 0 1 6.06 6.06L17.94 17.94Z" stroke="currentColor" stroke-width="2"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4C19 4 23 12 23 12A18.5 18.5 0 0 1 16.38 18.38L9.9 4.24Z" stroke="currentColor" stroke-width="2"/>
              <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/>
            </svg>
          </button>
        </div>
        <div class="error-message" *ngIf="passwordInput.invalid && passwordInput.touched">
          Password must be at least 12 characters long
        </div>
      </div>

      <button 
        type="submit" 
        class="login-btn"
        [disabled]="!loginForm.form.valid || isLoading"
        [class.loading]="isLoading">
        <span *ngIf="!isLoading">Log In</span>
        <div *ngIf="isLoading" class="loading-spinner">
          <div class="spinner"></div>
          <span>Logging in...</span>
        </div>
      </button>
    </form>
  </div>
</div>
