<h2 mat-dialog-title>Edit Short Answer Question</h2>

<mat-dialog-content [formGroup]="form" class="short-answer-edit-dialog">

  <div class="row">
    <mat-form-field appearance="outline" class="form-field">
      <mat-label>Question ID</mat-label>
      <input matInput formControlName="id" readonly placeholder="Auto-generated ID">
    </mat-form-field>
  </div>

  <div class="row">
    <mat-form-field appearance="outline" class="form-field full-width">
      <mat-label>Question</mat-label>
      <textarea matInput formControlName="question" rows="4" placeholder="Enter your question here"></textarea>
    </mat-form-field>
  </div>

  <div class="row">
    <mat-form-field appearance="outline" class="form-field weight-field">
      <mat-label>Weight Grade</mat-label>
      <input matInput type="number" formControlName="weight" min="0" step="0.01" placeholder="0.00">
    </mat-form-field>

    <mat-form-field appearance="outline" class="form-field points-field">
      <mat-label>Points</mat-label>
      <input matInput type="number" formControlName="points" min="0" placeholder="0">
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="!form.valid">Save</button>
</mat-dialog-actions>
